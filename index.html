<style>
  :root{
    --bg:#05060A;
    --panel:#0E1018;
    --panel2:#13151F;
    --line:#23253333;
    --purple:#7C3AED;
    --purple-bright:#A855F7;
    --gold:#F5A623;
    --green:#10B981;
    --red:#EF4444;
    --text:#F4F2FA;
    --sub:#8B8A99;
  }
  html{height:100%;}
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; min-height:100dvh; min-height:100vh; position:fixed; inset:0; overflow-y:auto;
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  #app{width:100%; min-height:100%;}
  .hidden{display:none !important;}

  /* ===== LOGIN ===== */
  #loginScreen{
    min-height:100dvh; min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:calc(env(safe-area-inset-top,0px) + 24px) 24px 24px;
    background:radial-gradient(circle at 50% 0%, #1A0F33 0%, #05060A 60%);
  }
  .logoWrap{text-align:center; margin-bottom:28px;}
  .logoWrap .nw{font-size:34px; font-weight:900; letter-spacing:1px; font-style:italic;}
  .logoWrap .tcg{
    font-size:30px; font-weight:900; font-style:italic; color:var(--purple-bright);
    text-shadow:0 0 18px rgba(168,85,247,.55);
  }
  .logoWrap .tag{font-size:11px; letter-spacing:3px; color:var(--sub); margin-top:6px;}
  .authCard{
    width:100%; max-width:360px; background:var(--panel); border:1px solid var(--line);
    border-radius:18px; padding:24px;
  }
  .authCard h2{margin:0 0 4px; font-size:19px;}
  .authCard p.sub{margin:0 0 18px; color:var(--sub); font-size:13px;}
  input{
    width:100%; padding:13px 14px; margin-bottom:12px; border-radius:10px;
    border:1px solid var(--line); background:var(--panel2); color:var(--text);
    font-size:15px;
  }
  input:focus{outline:none; border-color:var(--purple);}
  button{font-family:inherit; cursor:pointer;}
  .btnPrimary{
    width:100%; padding:14px; border-radius:10px; border:none;
    background:linear-gradient(135deg,var(--purple),var(--purple-bright));
    color:#fff; font-weight:700; font-size:15px; margin-top:4px;
  }
  .btnPrimary:active{opacity:.85;}
  .authSwitch{text-align:center; margin-top:14px; font-size:13px; color:var(--sub);}
  .authSwitch span{color:var(--purple-bright); font-weight:600;}
  .authError{color:var(--red); font-size:13px; margin:-4px 0 10px; min-height:14px;}

  /* ===== SHELL ===== */
  #mainShell{display:none; min-height:100dvh; min-height:100vh; flex-direction:column;}
  header.topbar{
    position:sticky; top:0; z-index:20; display:flex; align-items:center; justify-content:space-between;
    padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 14px;
    background:rgba(5,6,10,.92); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  header.topbar .brand{font-weight:900; font-style:italic; font-size:17px;}
  header.topbar .brand .tcgmini{color:var(--purple-bright);}
  .iconBtn{background:none; border:none; color:var(--sub); font-size:13px; padding:6px;}
  main{flex:1; padding:16px; padding-bottom:90px; max-width:720px; margin:0 auto; width:100%;}

  /* ===== TABS / BOTTOM NAV ===== */
  nav.bottomNav{
    position:fixed; bottom:0; left:0; right:0; z-index:30;
    display:flex; background:rgba(14,16,24,.96); backdrop-filter:blur(10px);
    border-top:1px solid var(--line); padding:6px 4px calc(env(safe-area-inset-bottom,0px) + 6px);
  }
  nav.bottomNav button{
    flex:1; background:none; border:none; color:var(--sub); font-size:11px;
    display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 2px;
  }
  nav.bottomNav button .ic{font-size:18px;}
  nav.bottomNav button.active{color:var(--purple-bright);}

  /* ===== CARDS / METRICS ===== */
  .metricsGrid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:18px;}
  .metricCard{
    background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px;
    position:relative; overflow:hidden;
  }
  .metricCard .label{font-size:11px; color:var(--sub); letter-spacing:.5px; text-transform:uppercase;}
  .metricCard .val{font-family:"SF Mono",Menlo,monospace; font-size:22px; font-weight:700; margin-top:6px;}
  .metricCard.profit .val{color:var(--green);}
  .metricCard.gold .val{color:var(--gold);}

  .sectionTitle{font-size:14px; font-weight:700; color:var(--sub); letter-spacing:.5px; text-transform:uppercase; margin:22px 0 10px;}

  /* holographic shimmer signature element */
  .holo{
    position:relative; border-radius:14px; overflow:hidden;
    background:var(--panel); border:1px solid var(--line);
  }
  .holo::before{
    content:""; position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(115deg, transparent 20%, rgba(124,58,237,.18) 35%, rgba(245,166,35,.12) 45%, rgba(168,85,247,.18) 55%, transparent 70%);
    background-size:200% 200%; background-position:0% 0%;
    animation:holoShift 6s ease-in-out infinite;
    mix-blend-mode:screen;
  }
  @keyframes holoShift{
    0%,100%{background-position:0% 0%;}
    50%{background-position:100% 100%;}
  }

  .cardRow{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:13px 14px; margin-bottom:8px;
  }
  .cardRow .ci{flex:1; min-width:0;}
  .cardRow .ci .nm{font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .cardRow .ci .meta{font-size:12px; color:var(--sub); margin-top:2px;}
  .cardRow .cv{text-align:right;}
  .cardRow .cv .price{font-family:monospace; font-weight:700; font-size:14px;}
  .pill{
    display:inline-block; font-size:10px; padding:3px 8px; border-radius:20px; font-weight:700;
    letter-spacing:.3px; text-transform:uppercase; margin-top:4px;
  }
  .pill.raw{background:#2A2D3A; color:#B8B8C8;}
  .pill.submitted{background:#3A2A12; color:var(--gold);}
  .pill.grading{background:#1F2A4A; color:#7AA2FF;}
  .pill.returned{background:#2A1F4A; color:var(--purple-bright);}
  .pill.listed{background:#123A2E; color:#34D399;}
  .pill.sold{background:#3A1212; color:#FF6B6B;}

  .emptyState{text-align:center; padding:50px 20px; color:var(--sub);}
  .emptyState .big{font-size:34px; margin-bottom:10px;}

  .fab{
    position:fixed; right:18px; bottom:86px; z-index:25;
    width:56px; height:56px; border-radius:50%; border:none;
    background:linear-gradient(135deg,var(--purple),var(--purple-bright));
    color:#fff; font-size:26px; box-shadow:0 6px 20px rgba(124,58,237,.5);
  }

  /* ===== MODAL ===== */
  .modalBg{
    display:none; position:fixed; inset:0; z-index:50; background:rgba(0,0,0,.6);
    align-items:flex-end; justify-content:center;
  }
  .modalBg.show{display:flex;}
  .modalSheet{
    width:100%; max-width:480px; max-height:88dvh; max-height:88vh; overflow-y:auto;
    background:var(--panel); border-radius:20px 20px 0 0; padding:20px 18px calc(env(safe-area-inset-bottom,0px) + 24px);
  }
  .modalSheet h3{margin:0 0 16px; font-size:18px;}
  label.fl{display:block; font-size:12px; color:var(--sub); margin:0 0 6px; text-transform:uppercase; letter-spacing:.4px;}
  select{
    width:100%; padding:13px 14px; margin-bottom:12px; border-radius:10px;
    border:1px solid var(--line); background:var(--panel2); color:var(--text); font-size:15px;
  }
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .modalActions{display:flex; gap:10px; margin-top:6px;}
  .btnGhost{
    flex:1; padding:13px; border-radius:10px; border:1px solid var(--line);
    background:none; color:var(--sub); font-weight:600;
  }
  .btnPrimary.small{flex:1; margin-top:0;}

  .toast{
    position:fixed; top:14px; left:50%; transform:translateX(-50%); z-index:99;
    background:var(--panel2); border:1px solid var(--purple); color:var(--text);
    padding:10px 18px; border-radius:30px; font-size:13px; opacity:0; transition:opacity .25s;
  }
  .toast.show{opacity:1;}

  ::-webkit-scrollbar{display:none;}

  /* ===== RESPONSIVE: iPad / Desktop ===== */
  @media (min-width: 700px){
    .authCard{max-width:420px;}
    main{max-width:840px; padding:28px; padding-bottom:40px;}
    .metricsGrid{grid-template-columns:repeat(3,1fr); gap:14px;}
    .fab{right:calc(50% - 410px); bottom:32px;}
    nav.bottomNav{display:none;}
    #mainShell{padding-bottom:0;}
    .topbar{padding:16px calc(50% - 410px + 16px);}
    .desktopNav{display:flex !important;}
  }
  @media (min-width: 1000px){
    main{max-width:960px;}
    .metricsGrid{grid-template-columns:repeat(4,1fr);}
    .fab{right:calc(50% - 470px);}
    .topbar{padding:16px calc(50% - 470px + 16px);}
  }
  .desktopNav{display:none; gap:6px;}
  .desktopNav button{
    background:none; border:none; color:var(--sub); font-size:13px; font-weight:600;
    padding:8px 14px; border-radius:8px;
  }
  .desktopNav button.active{color:var(--text); background:var(--panel2);}

</style>
</head>
<body>
<div id="app">

  <!-- ===================== LOGIN / SIGNUP ===================== -->
  <div id="loginScreen">
    <div class="logoWrap">
      <div class="nw">NEWPORT</div>
      <div class="tcg">TCG</div>
      <div class="tag">BUY &nbsp;•&nbsp; SELL &nbsp;•&nbsp; TRADE</div>
    </div>
    <div class="authCard">
      <h2 id="authTitle">Welcome back</h2>
      <p class="sub" id="authSub">Sign in to your vault</p>
      <div class="authError" id="authError"></div>
      <input type="email" id="authEmail" placeholder="Email" autocomplete="email">
      <input type="password" id="authPassword" placeholder="Password" autocomplete="current-password">
      <button class="btnPrimary" id="authSubmitBtn" onclick="submitAuth()">Sign In</button>
      <div class="authSwitch" id="authSwitch" onclick="toggleAuthMode()">
        Don't have an account? <span>Sign up</span>
      </div>
    </div>
  </div>

  <!-- ===================== MAIN SHELL ===================== -->
  <div id="mainShell">
    <header class="topbar">
      <div class="brand">NEWPORT <span class="tcgmini">TCG</span></div>
      <div class="desktopNav" id="desktopNav">
        <button id="dnavDashboard" class="active" onclick="switchTab('Dashboard')">Dashboard</button>
        <button id="dnavInventory" onclick="switchTab('Inventory')">Inventory</button>
        <button id="dnavGrading" onclick="switchTab('Grading')">Grading</button>
        <button id="dnavSales" onclick="switchTab('Sales')">Sales</button>
      </div>
      <button class="iconBtn" onclick="signOut()">Sign Out</button>
    </header>

    <main>
      <!-- DASHBOARD -->
      <section id="tabDashboard">
        <div class="metricsGrid" id="metricsGrid"></div>
        <div class="sectionTitle">Pipeline</div>
        <div id="pipelineSummary" class="holo" style="padding:14px;"></div>
        <div class="sectionTitle">Recent Activity</div>
        <div id="recentList"></div>
      </section>

      <!-- INVENTORY -->
      <section id="tabInventory" class="hidden">
        <div style="display:flex; align-items:center; justify-content:space-between;">
          <div class="sectionTitle" style="margin:22px 0 10px;">Cards & Sealed</div>
          <button onclick="document.getElementById('csvFileInput').click()" style="background:var(--panel2); border:1px solid var(--line); color:var(--purple-bright); font-size:12px; font-weight:700; padding:8px 12px; border-radius:8px;">Import CSV</button>
          <input type="file" id="csvFileInput" accept=".csv" class="hidden" onchange="handleCsvImport(event)">
        </div>
        <div id="inventoryList"></div>
      </section>

      <!-- GRADING -->
      <section id="tabGrading" class="hidden">
        <div class="sectionTitle">Grading Pipeline</div>
        <div id="gradingList"></div>
      </section>

      <!-- SALES -->
      <section id="tabSales" class="hidden">
        <div class="sectionTitle">Sales History</div>
        <div id="salesList"></div>
      </section>
    </main>

    <button class="fab" onclick="openAddCardModal()">+</button>

    <nav class="bottomNav">
      <button id="navDashboard" class="active" onclick="switchTab('Dashboard')"><span class="ic">&#9670;</span>Dashboard</button>
      <button id="navInventory" onclick="switchTab('Inventory')"><span class="ic">&#128193;</span>Inventory</button>
      <button id="navGrading" onclick="switchTab('Grading')"><span class="ic">&#128241;</span>Grading</button>
      <button id="navSales" onclick="switchTab('Sales')"><span class="ic">&#128176;</span>Sales</button>
    </nav>
  </div>
</div>

<!-- ===================== ADD/EDIT CARD MODAL ===================== -->
<div class="modalBg" id="cardModalBg">
  <div class="modalSheet">
    <h3 id="cardModalTitle">Add Card</h3>

    <label class="fl">Card Name</label>
    <input id="fName" placeholder="Charizard VMAX">

    <div class="row2">
      <div>
        <label class="fl">Set Name</label>
        <input id="fSet" placeholder="Champion's Path">
      </div>
      <div>
        <label class="fl">Card #</label>
        <input id="fNumber" placeholder="074/073">
      </div>
    </div>

    <label class="fl">Category</label>
    <select id="fCategory">
      <option>Pokemon</option>
      <option>One Piece</option>
      <option>Sports</option>
      <option>Lorcana</option>
      <option>Sealed</option>
    </select>

    <div class="row2">
      <div>
        <label class="fl">Condition</label>
        <input id="fCondition" placeholder="NM, LP, etc">
      </div>
      <div>
        <label class="fl">Status</label>
        <select id="fStatus">
          <option value="raw">Raw Inventory</option>
          <option value="submitted">Submitted to PSA</option>
          <option value="grading">Grading</option>
          <option value="returned">Returned</option>
          <option value="listed">Listed</option>
          <option value="sold">Sold</option>
        </select>
      </div>
    </div>

    <div class="row2">
      <div>
        <label class="fl">Purchase Price</label>
        <input id="fPurchase" type="number" inputmode="decimal" placeholder="0.00">
      </div>
      <div>
        <label class="fl">Market Value</label>
        <input id="fMarket" type="number" inputmode="decimal" placeholder="0.00">
      </div>
    </div>

    <label class="fl">Notes</label>
    <input id="fNotes" placeholder="Optional">

    <div class="modalActions">
      <button class="btnGhost" onclick="closeCardModal()">Cancel</button>
      <button class="btnPrimary small" onclick="saveCard()">Save Card</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  // ===================== CONFIG =====================
  // Fill these in with your NEW Supabase project's values (Project Settings > API)
  var SUPA_URL = "https://fphqmhefdfcvchdzvsqe.supabase.co";
  var SUPA_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwaHFtaGVmZGZjdmNoZHp2c3FlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MTI4NTMsImV4cCI6MjA5Nzk4ODg1M30.xHvlc7sYykbuvSOdFvjIOw8g_y2by8ffyGWQ7RGDdiI";

  var sb = supabase.createClient(SUPA_URL, SUPA_ANON_KEY);

  var authMode = "signin"; // signin | signup
  var currentUser = null;
  var allCards = [];
  var editingCardId = null;

  // ===================== AUTH =====================
  function toggleAuthMode(){
    authMode = (authMode === "signin") ? "signup" : "signin";
    document.getElementById("authTitle").textContent = authMode === "signin" ? "Welcome back" : "Create your vault";
    document.getElementById("authSub").textContent = authMode === "signin" ? "Sign in to your vault" : "Start tracking your collection";
    document.getElementById("authSubmitBtn").textContent = authMode === "signin" ? "Sign In" : "Sign Up";
    document.getElementById("authSwitch").innerHTML = authMode === "signin"
      ? "Don't have an account? <span>Sign up</span>"
      : "Already have an account? <span>Sign in</span>";
    document.getElementById("authError").textContent = "";
  }

  function submitAuth(){
    var email = document.getElementById("authEmail").value.trim();
    var password = document.getElementById("authPassword").value;
    var errEl = document.getElementById("authError");
    errEl.textContent = "";
    if(!email || !password){ errEl.textContent = "Enter email and password."; return; }

    if(authMode === "signin"){
      sb.auth.signInWithPassword({email:email, password:password}).then(function(res){
        if(res.error){ errEl.textContent = res.error.message; return; }
        onAuthSuccess(res.data.user);
      });
    } else {
      sb.auth.signUp({email:email, password:password}).then(function(res){
        if(res.error){ errEl.textContent = res.error.message; return; }
        if(res.data.user && !res.data.session){
          errEl.style.color = "var(--green)";
          errEl.textContent = "Check your email to confirm, then sign in.";
          toggleAuthMode();
        } else {
          onAuthSuccess(res.data.user);
        }
      });
    }
  }

  function onAuthSuccess(user){
    currentUser = user;
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("mainShell").style.display = "flex";
    loadAllData();
  }

  function signOut(){
    sb.auth.signOut().then(function(){
      currentUser = null;
      document.getElementById("mainShell").style.display = "none";
      document.getElementById("loginScreen").style.display = "flex";
    });
  }

  // check existing session on load
  sb.auth.getSession().then(function(res){
    if(res.data.session){ onAuthSuccess(res.data.session.user); }
  });

  // ===================== TABS =====================
  function switchTab(name){
    ["Dashboard","Inventory","Grading","Sales"].forEach(function(t){
      document.getElementById("tab"+t).classList.toggle("hidden", t !== name);
      document.getElementById("nav"+t).classList.toggle("active", t === name);
      document.getElementById("dnav"+t).classList.toggle("active", t === name);
    });
    if(name === "Inventory") renderInventory();
    if(name === "Grading") renderGrading();
    if(name === "Sales") renderSales();
  }

  // ===================== DATA =====================
  function loadAllData(){
    sb.from("cards").select("*").order("created_at",{ascending:false}).then(function(res){
      allCards = res.data || [];
      renderDashboard();
      renderInventory();
      renderGrading();
      renderSales();
    });
  }

  function money(n){ return "$" + (Number(n)||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); }

  function renderDashboard(){
    var totalCards = allCards.length;
    var costBasis = 0, marketValue = 0, unrealized = 0, realized = 0;
    var atPSA = 0, listed = 0, sold = 0;
    allCards.forEach(function(c){
      costBasis += Number(c.purchase_price)||0;
      if(c.status === "sold"){
        realized += (Number(c.sale_price)||0) - (Number(c.purchase_price)||0);
        sold++;
      } else {
        marketValue += Number(c.market_value)||0;
        unrealized += (Number(c.market_value)||0) - (Number(c.purchase_price)||0);
      }
      if(c.status === "submitted" || c.status === "grading") atPSA++;
      if(c.status === "listed") listed++;
    });

    var metrics = [
      {label:"Total Cards", val:totalCards, cls:""},
      {label:"Cost Basis", val:money(costBasis), cls:""},
      {label:"Market Value", val:money(marketValue), cls:"gold"},
      {label:"Unrealized P/L", val:money(unrealized), cls:"profit"},
      {label:"Realized Profit", val:money(realized), cls:"profit"},
      {label:"At Grading", val:atPSA, cls:""}
    ];
    document.getElementById("metricsGrid").innerHTML = metrics.map(function(m){
      return '<div class="metricCard '+m.cls+'"><div class="label">'+m.label+'</div><div class="val">'+m.val+'</div></div>';
    }).join("");

    document.getElementById("pipelineSummary").innerHTML =
      '<div style="display:flex; justify-content:space-between; font-size:13px;">' +
      '<div>Raw: <b>'+allCards.filter(function(c){return c.status==="raw";}).length+'</b></div>' +
      '<div>Submitted: <b>'+allCards.filter(function(c){return c.status==="submitted";}).length+'</b></div>' +
      '<div>Grading: <b>'+allCards.filter(function(c){return c.status==="grading";}).length+'</b></div>' +
      '<div>Listed: <b>'+listed+'</b></div>' +
      '<div>Sold: <b>'+sold+'</b></div>' +
      '</div>';

    var recent = allCards.slice(0,5);
    document.getElementById("recentList").innerHTML = recent.length ? recent.map(cardRowHTML).join("") :
      '<div class="emptyState"><div class="big">&#127183;</div>No cards yet. Tap + to add your first one.</div>';
  }

  function cardRowHTML(c){
    return '<div class="cardRow holo">' +
      '<div class="ci">' +
        '<div class="nm">'+escapeHtml(c.name)+'</div>' +
        '<div class="meta">'+escapeHtml(c.set_name||"")+(c.card_number?(" #"+escapeHtml(c.card_number)):"")+'</div>' +
        '<span class="pill '+c.status+'">'+statusLabel(c.status)+'</span>' +
      '</div>' +
      '<div class="cv">' +
        '<div class="price">'+money(c.status==="sold" ? c.sale_price : c.market_value)+'</div>' +
        '<div class="meta">cost '+money(c.purchase_price)+'</div>' +
      '</div>' +
    '</div>';
  }

  function statusLabel(s){
    var map = {raw:"Raw", submitted:"Submitted", grading:"Grading", returned:"Returned", listed:"Listed", sold:"Sold"};
    return map[s] || s;
  }

  function renderInventory(){
    var list = allCards.filter(function(c){ return c.status !== "sold"; });
    document.getElementById("inventoryList").innerHTML = list.length ? list.map(cardRowHTML).join("") :
      '<div class="emptyState"><div class="big">&#128230;</div>Inventory is empty.</div>';
  }

  function renderGrading(){
    var list = allCards.filter(function(c){ return c.status==="submitted" || c.status==="grading" || c.status==="returned"; });
    document.getElementById("gradingList").innerHTML = list.length ? list.map(cardRowHTML).join("") :
      '<div class="emptyState"><div class="big">&#127183;</div>Nothing in the grading pipeline.</div>';
  }

  function renderSales(){
    var list = allCards.filter(function(c){ return c.status==="sold"; });
    document.getElementById("salesList").innerHTML = list.length ? list.map(cardRowHTML).join("") :
      '<div class="emptyState"><div class="big">&#128176;</div>No sales recorded yet.</div>';
  }

  function escapeHtml(s){
    return (s||"").replace(/[&<>"']/g, function(m){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m];
    });
  }

  // ===================== ADD / EDIT CARD =====================
  function openAddCardModal(){
    editingCardId = null;
    document.getElementById("cardModalTitle").textContent = "Add Card";
    ["fName","fSet","fNumber","fCondition","fPurchase","fMarket","fNotes"].forEach(function(id){
      document.getElementById(id).value = "";
    });
    document.getElementById("fCategory").value = "Pokemon";
    document.getElementById("fStatus").value = "raw";
    document.getElementById("cardModalBg").classList.add("show");
  }

  function closeCardModal(){
    document.getElementById("cardModalBg").classList.remove("show");
  }

  function saveCard(){
    var payload = {
      user_id: currentUser.id,
      name: document.getElementById("fName").value.trim(),
      set_name: document.getElementById("fSet").value.trim(),
      card_number: document.getElementById("fNumber").value.trim(),
      category: document.getElementById("fCategory").value,
      condition: document.getElementById("fCondition").value.trim(),
      status: document.getElementById("fStatus").value,
      purchase_price: parseFloat(document.getElementById("fPurchase").value) || 0,
      market_value: parseFloat(document.getElementById("fMarket").value) || 0,
      notes: document.getElementById("fNotes").value.trim()
    };
    if(!payload.name){ showToast("Card name is required"); return; }

    sb.from("cards").insert(payload).then(function(res){
      if(res.error){ showToast("Error: " + res.error.message); return; }
      showToast("Card saved");
      closeCardModal();
      loadAllData();
    });
  }

  function showToast(msg){
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(function(){ t.classList.remove("show"); }, 2200);
  }

  // ===================== CSV IMPORT =====================
  // Accepts headers (case-insensitive, flexible naming) for: name, set, number,
  // category, condition, status, purchase price, market value, notes.
  var CSV_FIELD_MAP = {
    name: ["name","card name","card","title"],
    set_name: ["set","set name","setname"],
    card_number: ["number","card number","card #","card_number","#"],
    category: ["category","game","tcg"],
    condition: ["condition","grade condition"],
    status: ["status"],
    purchase_price: ["purchase price","purchase_price","cost","cost basis","paid"],
    market_value: ["market value","market_value","value","price","est. value","estimated value"],
    notes: ["notes","note","comment"]
  };

  function parseCsv(text){
    // simple CSV parser handling quoted fields and commas inside quotes
    var rows = [];
    var i = 0, field = "", row = [], inQuotes = false;
    while(i < text.length){
      var c = text[i];
      if(inQuotes){
        if(c === '"'){
          if(text[i+1] === '"'){ field += '"'; i += 2; continue; }
          inQuotes = false; i++; continue;
        }
        field += c; i++; continue;
      } else {
        if(c === '"'){ inQuotes = true; i++; continue; }
        if(c === ','){ row.push(field); field = ""; i++; continue; }
        if(c === '\n' || c === '\r'){
          if(c === '\r' && text[i+1] === '\n') i++;
          row.push(field); rows.push(row); row = []; field = ""; i++; continue;
        }
        field += c; i++; continue;
      }
    }
    if(field.length || row.length){ row.push(field); rows.push(row); }
    return rows.filter(function(r){ return r.length > 1 || (r[0] && r[0].trim()); });
  }

  function findColIndex(headers, aliases){
    for(var i=0;i<headers.length;i++){
      var h = headers[i].trim().toLowerCase();
      if(aliases.indexOf(h) !== -1) return i;
    }
    return -1;
  }

  function handleCsvImport(evt){
    var file = evt.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(e){
      var rows = parseCsv(e.target.result);
      if(rows.length < 2){ showToast("CSV looks empty"); return; }
      var headers = rows[0];
      var colIndex = {};
      Object.keys(CSV_FIELD_MAP).forEach(function(field){
        colIndex[field] = findColIndex(headers, CSV_FIELD_MAP[field]);
      });
      if(colIndex.name === -1){ showToast("No 'name' column found in CSV"); return; }

      var payloadRows = [];
      for(var r=1; r<rows.length; r++){
        var row = rows[r];
        if(!row[colIndex.name] || !row[colIndex.name].trim()) continue;
        payloadRows.push({
          user_id: currentUser.id,
          name: row[colIndex.name].trim(),
          set_name: colIndex.set_name !== -1 ? (row[colIndex.set_name]||"").trim() : "",
          card_number: colIndex.card_number !== -1 ? (row[colIndex.card_number]||"").trim() : "",
          category: colIndex.category !== -1 ? (row[colIndex.category]||"").trim() || "Pokemon" : "Pokemon",
          condition: colIndex.condition !== -1 ? (row[colIndex.condition]||"").trim() : "",
          status: colIndex.status !== -1 ? normalizeStatus(row[colIndex.status]) : "raw",
          purchase_price: colIndex.purchase_price !== -1 ? (parseFloat((row[colIndex.purchase_price]||"0").replace(/[^0-9.]/g,"")) || 0) : 0,
          market_value: colIndex.market_value !== -1 ? (parseFloat((row[colIndex.market_value]||"0").replace(/[^0-9.]/g,"")) || 0) : 0,
          notes: colIndex.notes !== -1 ? (row[colIndex.notes]||"").trim() : ""
        });
      }
      if(!payloadRows.length){ showToast("No valid rows found"); return; }

      sb.from("cards").insert(payloadRows).then(function(res){
        if(res.error){ showToast("Import error: " + res.error.message); return; }
        showToast(payloadRows.length + " cards imported");
        loadAllData();
      });
    };
    reader.readAsText(file);
    evt.target.value = "";
  }

  function normalizeStatus(s){
    s = (s||"").trim().toLowerCase();
    if(["raw","submitted","grading","returned","listed","sold"].indexOf(s) !== -1) return s;
    return "raw";
  }
</script>
